<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Друзья — PvZ Online</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
  <style>
    .friends-container { max-width: 700px; margin: 0 auto; padding: 30px 20px; }
    .section-title {
      font-family: 'Creepster', cursive;
      font-size: 22px;
      color: #4CAF50;
      margin-bottom: 15px;
    }
    .search-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      position: relative;
    }
    .search-input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .search-input:focus { border-color: #4CAF50; }
    .search-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #2e7d32, #4CAF50);
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .friend-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .friend-avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(76, 175, 80, 0.15);
      border: 2px solid rgba(76, 175, 80, 0.3);
      font-size: 22px;
      flex-shrink: 0;
    }
    .friend-avatar.banned {
      background: rgba(244, 67, 54, 0.15);
      border-color: rgba(244, 67, 54, 0.3);
      color: #f44336;
      font-size: 20px;
      font-weight: bold;
    }
    .friend-info { flex: 1; }
    .friend-name { font-weight: bold; font-size: 15px; }
    .online-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      margin-left: 4px;
      vertical-align: middle;
      transition: background 0.3s;
    }
    .online-dot.online {
      background: #4CAF50;
      box-shadow: 0 0 6px rgba(76, 175, 80, 0.6);
    }
    .friend-clan { font-size: 12px; color: #CE93D8; }
    .friend-stats { font-size: 11px; color: #888; }
    .friend-actions { display: flex; gap: 6px; }
    .friend-btn {
      padding: 6px 12px;
      border: 1px solid;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      color: #fff;
    }
    .btn-fight { border-color: #4CAF50; color: #4CAF50; }
    .btn-fight:hover { background: rgba(76,175,80,0.2); }
    .btn-remove { border-color: #f44336; color: #f44336; }
    .btn-remove:hover { background: rgba(244,67,54,0.2); }
    .btn-add {
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #2196F3, #1976D2);
      color: #fff;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(33,150,243,0.3);
    }
    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(33,150,243,0.4);
    }
    .btn-add:active {
      transform: translateY(0);
    }
    .btn-accept { border-color: #4CAF50; color: #4CAF50; }
    .btn-accept:hover { background: rgba(76,175,80,0.2); }
    .btn-decline { border-color: #f44336; color: #f44336; }
    .btn-decline:hover { background: rgba(244,67,54,0.2); }
    .request-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255,152,0,0.1);
      border: 1px solid rgba(255,152,0,0.3);
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .request-card .friend-avatar {
      background: rgba(255,152,0,0.15);
      border-color: rgba(255,152,0,0.3);
    }
    .search-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(33,150,243,0.1);
      border: 1px solid rgba(33,150,243,0.3);
      border-radius: 12px;
      margin-bottom: 15px;
    }
    .search-result .friend-avatar {
      background: rgba(33,150,243,0.15);
      border-color: rgba(33,150,243,0.3);
    }
    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .suggestion-item:hover { background: rgba(255,255,255,0.08); }
    .suggestion-item .emoji {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(76, 175, 80, 0.15);
      border: 2px solid rgba(76, 175, 80, 0.3);
      font-size: 16px;
      flex-shrink: 0;
    }
    .suggestion-item .name { font-weight: bold; font-size: 14px; }
    .suggestion-item .clan { font-size: 11px; color: #CE93D8; }
    .back-link {
      display: inline-block;
      padding: 10px 20px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: #fff; }
    .empty-msg { color: #666; text-align: center; padding: 30px; }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px;
      border-radius: 10px; border: 1px solid rgba(255,215,0,0.3);
      font-size: 14px; z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="friends-container">
    <h1 class="section-title">👥 Друзья</h1>

    <div class="search-group">
      <input type="text" class="search-input" id="search-input" placeholder="Никнейм игрока" autocomplete="off" />
      <button class="search-btn" onclick="searchPlayer()">Найти</button>
    </div>
    <div id="search-suggestions"></div>

    <div id="search-result"></div>

    <h2 class="section-title">Список друзей</h2>
    <div id="friends-list"></div>

    <h2 class="section-title">Входящие заявки</h2>
    <div id="requests-list"></div>

    <a href="/" class="back-link">← Назад в меню</a>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends-client.js"></script>
</body>
</html>
