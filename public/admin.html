<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — PvZ Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #login-box {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,0,0.3);
      text-align: center;
      width: 350px;
    }
    #login-box h1 {
      font-family: 'Creepster', cursive;
      color: #FFD700;
      font-size: 32px;
      margin-bottom: 20px;
    }
    #login-box input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 16px;
      margin-bottom: 15px;
      outline: none;
    }
    #login-box input:focus { border-color: #FFD700; }
    #login-box button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #b8860b, #FFD700);
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #login-box button:hover { transform: scale(1.03); }
    #login-error { color: #f44336; margin-top: 10px; font-size: 14px; }

    #dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
    #dashboard.active { display: block; }

    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(255,215,0,0.3);
    }
    .dash-header h1 {
      font-family: 'Creepster', cursive;
      color: #FFD700;
      font-size: 28px;
    }
    #logout-btn {
      padding: 8px 20px;
      border: 1px solid #f44336;
      border-radius: 8px;
      background: rgba(244,67,54,0.1);
      color: #f44336;
      cursor: pointer;
      font-size: 14px;
    }
    #logout-btn:hover { background: rgba(244,67,54,0.2); }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    .stat-card .num {
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
    }
    .stat-card .label { font-size: 14px; color: #888; margin-top: 5px; }

    .users-section h2 {
      font-family: 'Creepster', cursive;
      color: #4CAF50;
      font-size: 22px;
      margin-bottom: 15px;
    }

    #refresh-btn {
      padding: 8px 18px;
      border: 1px solid #4CAF50;
      border-radius: 8px;
      background: rgba(76,175,80,0.1);
      color: #4CAF50;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 15px;
    }
    #refresh-btn:hover { background: rgba(76,175,80,0.2); }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      overflow: hidden;
    }
    th {
      background: rgba(255,255,255,0.08);
      padding: 12px 15px;
      text-align: left;
      font-size: 13px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    td {
      padding: 10px 15px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }
    tr:hover td { background: rgba(255,255,255,0.03); }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge-admin { background: rgba(255,215,0,0.2); color: #FFD700; }
    .badge-banned { background: rgba(244,67,54,0.2); color: #f44336; }
    .badge-user { background: rgba(255,255,255,0.1); color: #888; }
    .badge-moderator { background: rgba(33,150,243,0.2); color: #2196F3; }
    .badge-super_player { background: rgba(156,39,176,0.2); color: #9C27B0; }
    .badge-vip { background: rgba(255,152,0,0.2); color: #FF9800; }
    .role-select {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }

    .action-btn {
      padding: 4px 10px;
      border: 1px solid;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      margin-right: 4px;
      transition: all 0.2s;
    }
    .action-btn:hover { opacity: 0.8; }
    .btn-ban { border-color: #f44336; color: #f44336; }
    .btn-unban { border-color: #4CAF50; color: #4CAF50; }
    .btn-admin { border-color: #FFD700; color: #FFD700; }
    .btn-reset { border-color: #2196F3; color: #2196F3; }
    .btn-delete { border-color: #9C27B0; color: #9C27B0; }
    .btn-kick { border-color: #FF5722; color: #FF5722; }
    .btn-end { border-color: #E91E63; color: #E91E63; }
    .btn-password { border-color: #00BCD4; color: #00BCD4; }
    .btn-gift { border-color: #FF9800; color: #FF9800; }

    .gifts-section {
      margin-top: 30px;
      padding: 20px;
      background: rgba(255,152,0,0.05);
      border: 1px solid rgba(255,152,0,0.2);
      border-radius: 14px;
    }
    .gifts-section h2 {
      font-family: 'Creepster', cursive;
      color: #FF9800;
      font-size: 22px;
      margin-bottom: 15px;
    }
    .gift-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .gift-select, .gift-input {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .gift-select { min-width: 150px; }
    .gift-input { min-width: 120px; flex: 1; }
    .gift-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #FF9800, #F57C00);
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .gift-btn:hover { transform: scale(1.05); }
    .gift-all-btn {
      background: linear-gradient(45deg, #E91E63, #C2185B);
    }
    #gift-result {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }
    #gift-result.success {
      display: block;
      background: rgba(76,175,80,0.1);
      border: 1px solid rgba(76,175,80,0.3);
      color: #4CAF50;
    }
    #gift-result.error {
      display: block;
      background: rgba(244,67,54,0.1);
      border: 1px solid rgba(244,67,54,0.3);
      color: #f44336;
    }

    .games-section {
      margin-top: 30px;
    }
    .games-section h2 {
      font-family: 'Creepster', cursive;
      color: #FF5722;
      font-size: 22px;
      margin-bottom: 15px;
    }
    .game-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: bold;
    }
    .status-playing { background: rgba(76,175,80,0.2); color: #4CAF50; }

    @media (max-width: 768px) {
      .stats-row { flex-direction: column; }
      table { font-size: 12px; }
      th, td { padding: 8px 10px; }
      .action-btn { padding: 3px 6px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <div id="login-box">
      <h1>️ Админ-панель</h1>
      <p style="color:#888;margin-bottom:20px;">Доступ только для аккаунта "admin"</p>
      <div id="login-error" style="color:#f44336;margin-bottom:15px;"></div>
      <button onclick="window.location.href='/'" style="width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(45deg,#b8860b,#FFD700);color:#000;font-size:16px;font-weight:bold;cursor:pointer;">← В меню</button>
    </div>
  </div>

  <div id="dashboard">
    <div class="dash-header">
      <h1>🛡️ Админ-панель</h1>
      <button id="logout-btn" onclick="logout()">Выйти</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="stat-users">0</div>
        <div class="label">Всего игроков</div>
      </div>
    </div>

    <div class="users-section">
      <h2>👥 Игроки</h2>
      <button id="refresh-btn" onclick="loadUsers()">🔄 Обновить</button>
      <table>
        <thead>
          <tr>
            <th>Никнейм</th>
            <th>Победы</th>
            <th>Проигрыши</th>
            <th>Роль</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>

    <div class="games-section">
      <h2>🎮 Активные игры</h2>
      <button id="refresh-games-btn" onclick="loadGames()">🔄 Обновить</button>
      <table>
        <thead>
          <tr>
            <th>Игра</th>
            <th> Растение</th>
            <th>🧟 Зомби</th>
            <th>HP дома</th>
            <th>Время</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="games-tbody"></tbody>
      </table>
    </div>

    <div class="gifts-section">
      <h2>🎁 Отправить подарок</h2>
      <div class="gift-form">
        <select id="gift-user" class="gift-select">
          <option value="">Выберите игрока</option>
        </select>
        <select id="gift-type" class="gift-select" onchange="onGiftTypeChange()">
          <option value="coins">🪙 Монеты</option>
          <option value="plant">🌱 Растение</option>
          <option value="zombie">🧟 Зомби</option>
          <option value="box"> Бокс</option>
          <option value="role">👑 Роль</option>
        </select>
        <div id="gift-item-wrapper" style="display:none;">
          <select id="gift-item-select" class="gift-select">
            <option value="">Выберите...</option>
          </select>
        </div>
        <input type="number" id="gift-amount" class="gift-input" placeholder="Кол-во" />
        <input type="text" id="gift-message" class="gift-input" placeholder="Сообщение (необязательно)" />
        <button class="gift-btn" onclick="sendGift()">🎁 Отправить</button>
        <button class="gift-btn gift-all-btn" onclick="sendGiftAll()">🎁 Подарок всем</button>
      </div>
      <div id="gift-result"></div>
    </div>
  </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
