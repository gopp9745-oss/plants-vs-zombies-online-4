<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Присоединиться — PvZ Online</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
  <style>
    .join-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .join-title {
      font-family: 'Creepster', cursive;
      font-size: 36px;
      color: #FFD700;
      margin-bottom: 20px;
    }
    .role-buttons { display: flex; gap: 20px; margin-bottom: 30px; }
    .role-btn {
      padding: 20px 40px;
      border: 2px solid;
      border-radius: 16px;
      background: transparent;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
      min-width: 160px;
    }
    .role-btn:hover { transform: scale(1.05); }
    .role-btn.plant { border-color: #4CAF50; color: #4CAF50; }
    .role-btn.plant:hover { background: rgba(76,175,80,0.1); }
    .role-btn.zombie { border-color: #9C27B0; color: #CE93D8; }
    .role-btn.zombie:hover { background: rgba(156,39,176,0.1); }
    .role-btn .emoji { font-size: 48px; display: block; margin-bottom: 8px; }
    .role-btn .name { font-size: 18px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="join-container">
    <h1 class="join-title">🎮 Дружеский бой</h1>
    <p style="color:#888;margin-bottom:20px;">Выбери сторону:</p>
    <div class="role-buttons">
      <button class="role-btn plant" onclick="join('plant')">
        <span class="emoji">🌻</span>
        <span class="name">Растение</span>
      </button>
      <button class="role-btn zombie" onclick="join('zombie')">
        <span class="emoji">🧟</span>
        <span class="name">Зомби</span>
      </button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const socket = io();
    const params = new URLSearchParams(window.location.search);
    const gameId = params.get('gameId');
    const friendId = params.get('friendId');

    function join(role) {
      socket.emit('friend_join_match', {
        userId: currentUser.id,
        role,
        loadout: [],
        nickname: currentUser.nickname,
        gameId,
        friendId
      });
    }

    socket.on('match_found', ({ gameId: gid, role, plantNickname, zombieNickname }) => {
      sessionStorage.setItem('gameRole', role);
      sessionStorage.setItem('plantNickname', plantNickname);
      sessionStorage.setItem('zombieNickname', zombieNickname);
      window.location.href = `/game.html?gameId=${gid}`;
    });
  </script>
</body>
</html>
