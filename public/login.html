<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Plants vs Zombies</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="auth-container">
    <h1 class="game-title">🌻 PvZ Online 🧟</h1>
    
    <div id="login-form" class="auth-form">
      <h2>Вход</h2>
      <input type="text" id="login-nickname" placeholder="Никнейм" autocomplete="off">
      <input type="password" id="login-password" placeholder="Пароль">
      <button onclick="login()">Войти</button>
      <p class="switch-text">Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a></p>
    </div>

    <div id="register-form" class="auth-form hidden">
      <h2>Регистрация</h2>
      <input type="text" id="register-nickname" placeholder="Никнейм (мин. 3 символа)" autocomplete="off">
      <input type="password" id="register-password" placeholder="Пароль (мин. 4 символа)">
      <input type="password" id="register-password-confirm" placeholder="Подтвердите пароль">
      <button onclick="register()">Зарегистрироваться</button>
      <p class="switch-text">Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
    </div>

    <div id="auth-message" class="message hidden"></div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
