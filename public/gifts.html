<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подарки — PvZ Online</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
  <style>
    .gifts-container { max-width: 700px; margin: 0 auto; padding: 30px 20px; }
    .section-title {
      font-family: 'Creepster', cursive;
      font-size: 22px;
      color: #FF9800;
      margin-bottom: 15px;
    }
    .gift-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,152,0,0.08);
      border: 1px solid rgba(255,152,0,0.2);
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .gift-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,152,0,0.15);
      border: 2px solid rgba(255,152,0,0.3);
      font-size: 22px;
      flex-shrink: 0;
    }
    .gift-info { flex: 1; }
    .gift-type { font-weight: bold; font-size: 15px; }
    .gift-from { font-size: 12px; color: #888; }
    .gift-message { font-size: 12px; color: #CE93D8; font-style: italic; }
    .gift-date { font-size: 11px; color: #666; }
    .gift-claim-btn {
      padding: 8px 16px;
      background: rgba(76,175,80,0.2);
      border: 1px solid #4CAF50;
      border-radius: 8px;
      color: #4CAF50;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .gift-claim-btn:hover { background: rgba(76,175,80,0.35); }
    .back-link {
      display: inline-block;
      padding: 10px 20px;
      color: #888;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: #fff; }
    .empty-msg { color: #666; text-align: center; padding: 30px; }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px;
      border-radius: 10px; border: 1px solid rgba(255,215,0,0.3);
      font-size: 14px; z-index: 9999;
    }

    /* Box opening animation */
    #reward-overlay {
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    #reward-overlay.fade-out { opacity: 0; transition: opacity 0.4s; }
    .reward-container { text-align: center; }
    .reward-box {
      font-size: 120px; transition: transform 0.3s;
      transform-origin: center;
    }
    .reward-box.shake {
      animation: boxShake 0.15s infinite alternate;
    }
    .reward-box.open {
      animation: boxOpen 0.5s forwards;
      opacity: 0; transform: scale(2) rotate(20deg);
    }
    .reward-result {
      margin-top: 30px; opacity: 0; transform: scale(0);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .reward-result.show { opacity: 1; transform: scale(1); }
    .reward-emoji {
      font-size: 100px;
      animation: rewardGlow 1s ease-in-out infinite alternate;
    }
    .reward-label {
      font-family: 'Creepster', cursive;
      font-size: 28px; color: #FFD700; margin-top: 10px;
    }
    .reward-subtitle {
      font-size: 16px; color: #4CAF50; margin-top: 5px;
    }

    @keyframes boxShake {
      0% { transform: rotate(-5deg) scale(1); }
      100% { transform: rotate(5deg) scale(1.1); }
    }
    @keyframes boxOpen {
      0% { opacity: 1; transform: scale(1) rotate(0); }
      100% { opacity: 0; transform: scale(2) rotate(30deg); }
    }
    @keyframes rewardGlow {
      0% { filter: drop-shadow(0 0 5px rgba(255,215,0,0.5)); transform: scale(1); }
      100% { filter: drop-shadow(0 0 25px rgba(255,215,0,0.9)); transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="gifts-container">
    <h1 class="section-title">🎁 Мои подарки</h1>
    <div id="gifts-list"></div>
    <a href="/" class="back-link">← Назад в меню</a>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/gifts-client.js"></script>
</body>
</html>
